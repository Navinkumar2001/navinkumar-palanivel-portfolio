<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: #0a0a0f;
  display: flex; align-items: center; justify-content: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;
  position: relative;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
}
.content {
  text-align: center; z-index: 1; position: relative;
}
h1 {
  font-size: 56px; font-weight: 700;
  background: linear-gradient(135deg, #00d4ff, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
p {
  font-size: 24px; color: rgba(255,255,255,0.6);
  margin-bottom: 24px;
}
.tags {
  display: flex; gap: 12px; justify-content: center;
}
.tag {
  padding: 8px 16px; border-radius: 6px;
  background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
  color: #00d4ff; font-size: 14px;
}
.corner { position: absolute; width: 40px; height: 40px; border-color: rgba(0,212,255,0.3); border-style: solid; }
.tl { top: 30px; left: 30px; border-width: 2px 0 0 2px; }
.tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
.bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
.br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="content">
    <h1>Navinkumar Palanivel</h1>
    <p>Full-Stack Developer | FinTech & AI Platforms</p>
    <div class="tags">
      <span class="tag">Angular</span>
      <span class="tag">Vue.js</span>
      <span class="tag">TypeScript</span>
      <span class="tag">Python</span>
      <span class="tag">FastAPI</span>
    </div>
  </div>
</body>
</html>
