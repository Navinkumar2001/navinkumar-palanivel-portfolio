<!-- Floating terminal icon/label -->
<button class="terminal-trigger" (click)="toggle()" aria-label="Open Terminal" [class.hidden]="isOpen">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="4 17 10 11 4 5"></polyline>
    <line x1="12" y1="19" x2="20" y2="19"></line>
  </svg>
  <span class="trigger-label">Terminal</span>
</button>

<div class="terminal-overlay" *ngIf="isOpen" (click)="onOverlayClick($event)">
  <div class="terminal-window" [class.navin-active]="navinEffectActive" (click)="$event.stopPropagation()">
    <!-- Terminal Title Bar -->
    <div class="terminal-titlebar">
      <div class="titlebar-dots">
        <span class="dot close" (click)="close()"></span>
        <span class="dot minimize"></span>
        <span class="dot maximize"></span>
      </div>
      <span class="titlebar-text">navinkumar&#64;portfolio:~</span>
      <span class="titlebar-hint">Ctrl + /</span>
    </div>

    <!-- Terminal Body -->
    <div class="terminal-body" #terminalBody>
      <!-- Welcome message -->
      <div class="terminal-welcome" *ngIf="history.length === 0">
        <pre class="ascii-art">{{ asciiArt }}</pre>
        <p class="welcome-text">Welcome to Navinkumar's Terminal v1.0.0</p>
        <p class="welcome-hint">Type <span class="cmd-highlight">help</span> to see available commands</p>
      </div>

      <!-- History -->
      <div *ngFor="let line of history" [ngClass]="'line line-' + line.type">
        <span *ngIf="line.type === 'input'" class="prompt">visitor&#64;portfolio:~$&nbsp;</span>
        <span *ngIf="!line.safeHtml" [innerHTML]="line.text"></span>
        <div *ngIf="line.safeHtml" [innerHTML]="line.safeHtml"></div>
      </div>

      <!-- Current input -->
      <div class="input-line">
        <span class="prompt">visitor&#64;portfolio:~$&nbsp;</span>
        <input
          #inputEl
          type="text"
          [(ngModel)]="currentInput"
          (keydown)="onKeyDown($event)"
          class="terminal-input"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Navin effect scanlines overlay -->
    <div class="navin-scanlines" *ngIf="navinEffectActive"></div>
  </div>
</div>
